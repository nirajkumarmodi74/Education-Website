<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div id="header"></div>

    <script>
      window.onload = function () {
        fetch("header.html")
          .then((response) => {
            if (!response.ok) {
              throw new Error("Failed to load header");
            }
            return response.text();
          })
          .then((data) => {
            console.log();
            const vardata = document.getElementById("header");

            vardata.innerHTML = data;
          })
          .catch((error) => {
            console.error("Error:", error);
          });
      };
    </script>
  </body>
</html>
